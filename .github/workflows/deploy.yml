name: Deploy Go app

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/${{ secrets.APP_NAME }} ./cmd/bot/main.go

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          RELEASE_ID="${{ github.event.release.tag_name }}"
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "mkdir -p /opt/$APP_NAME/releases/$RELEASE_ID"
          scp -P "$SSH_PORT" dist/$APP_NAME "$SSH_USER@$SSH_HOST:/opt/$APP_NAME/releases/$RELEASE_ID/$APP_NAME"

      - name: Activate release and restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            chmod +x /opt/$APP_NAME/releases/$RELEASE_ID/$APP_NAME &&
            ln -sfn /opt/$APP_NAME/releases/$RELEASE_ID/$APP_NAME /opt/$APP_NAME/current/$APP_NAME &&
            sudo systemctl restart $APP_NAME &&
            sudo systemctl is-active $APP_NAME
          "

      - name: Cleanup old releases
        if: success()
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          APP_NAME: ${{ secrets.APP_NAME }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "
            cd /opt/$APP_NAME/releases &&
            ls -1dt */ | tail -n +6 | xargs -r rm -rf
          "